'
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sai Om Jewellers</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background: radial-gradient(circle at center, #111 0%, #000 70%, #000 100%);
color:#fff;
overflow-x:hidden;
font-family:'Cinzel', serif;
}

/* Splash Screen */

#splash{
position:fixed;
width:100%;
height:100vh;
top:0;
left:0;
overflow:hidden;
}

#splash .overlay{
position:absolute;
width:100%;
height:100%;
background:radial-gradient(circle, transparent 40%, rgba(0,0,0,0.95));
}

#splash .wrapper{
text-align:center;
position:relative;
z-index:10;
}

#splash .ring{
position:absolute;
width:420px;
height:420px;
border-radius:50%;
border:1px solid rgba(212,175,55,0.25);
top:50%;
left:50%;
transform:translate(-50%,-50%);
animation:rotate 18s linear infinite;
}

#splash .ring::after{
content:'';
position:absolute;
inset:22px;
border-radius:50%;
border:1px dashed rgba(212,175,55,0.5);
}

#splash .light{
position:absolute;
top:50%;
left:-160%;
width:160%;
height:2px;
background:linear-gradient(
90deg,
transparent,
rgba(255,255,255,0.9),
rgba(212,175,55,0.4),
transparent
);
transform:translateY(-50%);
animation:shine 3s linear infinite;
}

#splash .center{
width:260px;
height:260px;
border-radius:50%;
background:rgba(0,0,0,0.7);
display:flex;
justify-content:center;
align-items:center;
margin:auto;
box-shadow:
0 0 50px rgba(212,175,55,0.18),
inset 0 0 30px rgba(212,175,55,0.12);
animation:zoom 1.5s ease;
}

#splash .logo{
font-size:95px;
color:#D4AF37;
letter-spacing:12px;
text-shadow:
0 0 15px rgba(212,175,55,0.8),
0 0 35px rgba(212,175,55,0.5);
}

#splash h1{
margin-top:55px;
color:#fff;
font-size:46px;
letter-spacing:10px;
animation:fadeUp 2s ease;
}

#splash p{
margin-top:18px;
color:#bdbdbd;
font-size:14px;
letter-spacing:6px;
animation:fadeUp 2.5s ease;
}

#splash .line{
width:0;
height:2px;
background:linear-gradient(to right, transparent, #D4AF37, transparent);
margin:40px auto;
animation:lineGrow 2s forwards;
}

#splash .loader{
display:flex;
justify-content:center;
gap:10px;
}

#splash .loader span{
width:8px;
height:8px;
border-radius:50%;
background:#D4AF37;
box-shadow:0 0 12px #D4AF37;
animation:bounce 0.8s infinite alternate;
}

#splash .loader span:nth-child(2){animation-delay:0.2s;}
#splash .loader span:nth-child(3){animation-delay:0.4s;}

@keyframes rotate{
from{transform:translate(-50%,-50%) rotate(0deg);}
to{transform:translate(-50%,-50%) rotate(360deg);}
}

@keyframes shine{
0%{left:-160%; opacity:0;}
50%{opacity:1;}
100%{left:160%; opacity:0;}
}

@keyframes zoom{
from{transform:scale(0.7); opacity:0;}
to{transform:scale(1); opacity:1;}
}

@keyframes fadeUp{
from{opacity:0; transform:translateY(25px);}
to{opacity:1; transform:translateY(0);}
}

@keyframes lineGrow{
from{width:0;}
to{width:360px;}
}

@keyframes bounce{
from{transform:translateY(0); opacity:0.4;}
to{transform:translateY(-10px); opacity:1;}
}

/* Main Content */

#main{
display:none;
}

/* Header */

header{
padding:20px;
background:#111;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid gold;
position:sticky;
top:0;
z-index:100;
}

header h1{
color:gold;
}

.header-actions{
display:flex;
gap:20px;
align-items:center;
}

.rate-panel{
display:flex;
gap:20px;
font-size:14px;
}

.wishlist-btn{
padding:10px 18px;
background:transparent;
color:#fff;
border:1px solid gold;
border-radius:30px;
cursor:pointer;
font-weight:bold;
transition:all 0.25s ease;
}

.wishlist-btn:hover{
background:gold;
color:#000;
}

.product-detail{
font-size:0.95rem;
color:#ccc;
margin:10px 0;
}

.hallmark{
font-size:0.92rem;
color:#ffdd55;
margin-top:8px;
}

/* Categories */

.categories{
display:flex;
overflow:auto;
padding:15px;
gap:10px;
background:#111;
}

.categories button{
padding:10px 20px;
background:gold;
border:none;
cursor:pointer;
border-radius:30px;
font-weight:bold;
min-width:120px;
}

/* Product Grid */

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#111;
padding:15px;
border-radius:15px;
border:1px solid #333;
transition:0.3s;
position:relative;
}

.card:hover{
transform:translateY(-5px);
border-color:gold;
}

.card img{
width:100%;
height:220px;
object-fit:cover;
border-radius:10px;
cursor:pointer;
}

.card h3{
margin-top:10px;
color:gold;
}

.price{
font-size:20px;
margin:10px 0;
color:#00ff99;
}

.btns{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.btns button{
flex:1;
padding:10px;
border:none;
cursor:pointer;
border-radius:5px;
font-weight:bold;
}

.cart-btn{
background:gold;
}

.wish-btn{
background:#ff0066;
color:#fff;
}

.buy-btn{
background:#00cc66;
color:#fff;
}

/* Floating Cart */

.floating-cart{
position:fixed;
bottom:20px;
right:20px;
background:gold;
color:#000;
width:60px;
height:60px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:25px;
cursor:pointer;
z-index:999;
}

.badge{
position:absolute;
top:-5px;
right:-5px;
background:red;
color:#fff;
width:22px;
height:22px;
font-size:12px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
}

/* Modal */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100vh;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
}

.modal img{
max-width:90%;
max-height:90%;
border:5px solid gold;
border-radius:10px;
}

.order-card{
background:#111;
border-radius:20px;
padding:30px;
max-width:520px;
width:100%;
position:relative;
box-shadow:0 30px 80px rgba(0,0,0,0.35);
}

.close-order{
position:absolute;
top:18px;
right:18px;
color:#fff;
font-size:18px;
cursor:pointer;
}

.order-form{
display:flex;
flex-direction:column;
gap:15px;
margin-top:20px;
}

.order-form input,
.order-form textarea{
padding:14px;
border-radius:12px;
border:1px solid #333;
background:#0d0d0d;
color:#fff;
outline:none;
}

.order-form button{
padding:14px;
border:none;
border-radius:50px;
background:gold;
color:#000;
font-weight:bold;
cursor:pointer;
}

.order-showcase{
margin-top:15px;
line-height:1.7;
color:#ddd;
}

.admin-order-card{
margin-top:16px;
padding:18px;
background:#121212;
border:1px solid #333;
border-radius:16px;
}

/* Admin Panel */

#adminPanel{
display:none;
padding:20px;
background:#111;
border-top:2px solid gold;
}

.admin-input{
padding:10px;
margin:10px 0;
width:100%;
}

.admin-btn{
padding:10px;
background:gold;
border:none;
cursor:pointer;
font-weight:bold;
}

@media(max-width:768px){

.logo{
font-size:35px;
}

header{
flex-direction:column;
gap:10px;
}

}

</style>
</head>
<body>

<!-- Splash Screen -->

<div id="splash">
<div class="overlay"></div>
<div class="wrapper">
<div class="ring"></div>
<div class="light"></div>
<div class="center">
<div class="logo">SOJ</div>
</div>
<h1>SAI OM JEWELLERS</h1>
<p>LUXURY • TRUST • PURITY</p>
<div class="line"></div>
<div class="loader">
<span></span>
<span></span>
<span></span>
</div>
</div>
</div>

<!-- Main Content -->

<div id="main">

<!-- Header -->

<header>
<h1>Sai Om Jewellers</h1>

<div class="header-actions">
<div class="rate-panel">
<div>Gold: ₹ <span id="goldRate">6500</span>/g</div>
<div>Silver: ₹ <span id="silverRate">80</span>/g</div>
</div>
<button class="wishlist-btn" onclick="openWishlist()">Wishlist (<span id="wishlistCount">0</span>)</button>
</div>
</header>

<!-- Categories -->

<div class="categories">
<button onclick="filterByMetal('Gold')">Gold</button>
<button onclick="filterByMetal('Silver')">Silver</button>
</div>

<!-- Products -->

<div class="products" id="productContainer"></div>

<!-- Floating Cart -->

<div class="floating-cart" onclick="viewCart()">
🛒
<div class="badge" id="cartCount">0</div>
</div>

<!-- Image Modal -->

<div class="modal" id="imgModal" onclick="closeModal()">
<img id="modalImg">
</div>

<div class="modal" id="orderModal" onclick="if(event.target===this) closeOrderModal()">
<div class="order-card">
<div class="close-order" onclick="closeOrderModal()">✕</div>
<h2>Place Your Order</h2>
<div class="order-product" id="orderProductDetails"></div>
<form class="order-form" onsubmit="event.preventDefault(); submitOrder();">
<input type="text" id="customerName" placeholder="Customer Name" required>
<input type="tel" id="customerContact" placeholder="Contact Number" required>
<textarea id="customerAddress" placeholder="Address" rows="4" required></textarea>
<button type="submit">Place Order</button>
</form>
</div>
</div>

<!-- Admin Panel -->

<div id="adminPanel">
<h2>Admin Panel</h2>

<input type="text" id="pname" class="admin-input" placeholder="Product Name">

<input type="number" id="pweight" class="admin-input" placeholder="Weight">

<input type="text" id="pmetal" class="admin-input" placeholder="Metal">

<input type="text" id="pimg" class="admin-input" placeholder="Image URL">

<textarea id="pdetails" class="admin-input" placeholder="Product Details" rows="3"></textarea>

<input type="text" id="phallmark" class="admin-input" placeholder="Hallmark Information">

<input type="text" id="ppurity" class="admin-input" placeholder="Purity (e.g., 22K, 24K, 18K)">

<button class="admin-btn" onclick="addProduct()">
Add Product
</button>

<hr>

<input type="number" id="newGold" class="admin-input" placeholder="Update Gold Rate">

<input type="number" id="newSilver" class="admin-input" placeholder="Update Silver Rate">

<button class="admin-btn" onclick="updateRates()">
Update Rates
</button>

<div id="ordersSection">
<h3>Orders</h3>
<div id="orderList">No orders yet.</div>
</div>

</div>

<script>

/* 2 seconds splash screen */

window.onload = function(){
setTimeout(function(){
document.getElementById("splash").style.display = "none";
document.getElementById("main").style.display = "block";
}, 3000);
}

/* Scroll to products */

function scrollToProducts(){
document.getElementById("productContainer").scrollIntoView({behavior:"smooth", block:"start"});
}

/* Product Data */

let products = JSON.parse(localStorage.getItem("products")) || [

{
id:1,
name:"Luxury Gold Ring",
metal:"Gold",
weight:12,
image:"https://images.unsplash.com/photo-1617038220319-276d3cfab638",
rating:4.8,
reviews:120
},

{
id:2,
name:"Silver Necklace",
metal:"Silver",
weight:30,
image:"https://images.unsplash.com/photo-1605100804763-247f67b3557e",
rating:4.5,
reviews:80
}

];

/* Rates */

let goldRate = localStorage.getItem("goldRate") || 6500;
let silverRate = localStorage.getItem("silverRate") || 80;

document.getElementById("goldRate").innerText = goldRate;
document.getElementById("silverRate").innerText = silverRate;

/* Cart */

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];
let orders = JSON.parse(localStorage.getItem("orders")) || [];
let currentOrderProductId = null;
let filteredProducts = products;
let currentFilter = null;

function saveCart(){
localStorage.setItem("cart",JSON.stringify(cart));
document.getElementById("cartCount").innerText = cart.length;
}

function saveWishlist(){
localStorage.setItem("wishlist",JSON.stringify(wishlist));
document.getElementById("wishlistCount").innerText = wishlist.length;
}

function saveOrders(){
localStorage.setItem("orders",JSON.stringify(orders));
}

saveCart();
saveWishlist();
displayOrders();

/* Filter Products by Metal */

function filterByMetal(metal){
currentFilter = metal;
filteredProducts = products.filter(p => p.metal === metal);
renderProducts();
}

/* Render Products */

function renderProducts(){

let container = document.getElementById("productContainer");

container.innerHTML = "";

let productsToDisplay = currentFilter ? filteredProducts : products;

productsToDisplay.forEach(product=>{

let wishLabel = wishlist.includes(product.id) ? '♥ Added' : '♡ Wishlist';

container.innerHTML += `

<div class="card">

<img src="${product.image}"
onclick="openModal('${product.image}')">

<h3>${product.name}</h3>

<p>Product No: SOJ${product.id}</p>

<p>Metal: ${product.metal}</p>

<p>Weight: ${product.weight}g</p>

${product.purity ? `<p>Purity: ${product.purity}</p>` : ''}

<p>⭐ ${product.rating} (${product.reviews})</p>

${product.details ? `<p class="product-detail">${product.details}</p>` : ''}
${product.hallmark ? `<p class="hallmark">Hallmark: ${product.hallmark}</p>` : ''}

<div class="btns">

<button class="cart-btn"
onclick="addToCart(${product.id})">
Cart
</button>

<button class="wish-btn" onclick="toggleWishlist(${product.id})">
${wishLabel}
</button>

<button class="buy-btn"
onclick="openOrderForm(${product.id})">
Buy
</button>

</div>

</div>

`;

});

}

renderProducts();

/* Add Cart */

function addToCart(id){

cart.push(id);

saveCart();

alert("Added To Cart");

}

/* Buy */

function openOrderForm(id){
currentOrderProductId = id;
let product = products.find(item=>item.id === id);

if(!product) return;

let details = `<strong>${product.name}</strong><br>Metal: ${product.metal}<br>Weight: ${product.weight}g`;
if(product.details) details += `<br>${product.details}`;
if(product.hallmark) details += `<br><span class="hallmark">Hallmark: ${product.hallmark}</span>`;

document.getElementById("orderProductDetails").innerHTML = details;
document.getElementById("orderModal").style.display = "flex";
}

function submitOrder(){
let name = document.getElementById("customerName").value.trim();
let contact = document.getElementById("customerContact").value.trim();
let address = document.getElementById("customerAddress").value.trim();

if(!name || !contact || !address){
alert("Please complete all fields.");
return;
}

let product = products.find(item=>item.id === currentOrderProductId);

orders.push({
orderId: Date.now(),
customerName: name,
contactNumber: contact,
address: address,
product: product
});

saveOrders();
displayOrders();
closeOrderModal();

document.getElementById("customerName").value = "";
document.getElementById("customerContact").value = "";
document.getElementById("customerAddress").value = "";

alert("Order placed successfully.");
}

function closeOrderModal(){
document.getElementById("orderModal").style.display = "none";
}

function viewCart(){
alert("Cart Items: " + cart.length);
}

function openWishlist(){
if(wishlist.length === 0){
alert("Your wishlist is empty.");
return;
}

let list = wishlist.map(id => {
let product = products.find(item=>item.id === id);
return product ? `• ${product.name}` : null;
}).filter(Boolean).join("\n");

alert("Wishlist:\n" + list);
}

function toggleWishlist(id){
let index = wishlist.indexOf(id);
if(index === -1){
wishlist.push(id);
alert("Added to wishlist.");
}else{
wishlist.splice(index,1);
alert("Removed from wishlist.");
}

saveWishlist();
renderProducts();
}

function displayOrders(){
let container = document.getElementById("orderList");

if(orders.length === 0){
container.innerHTML = "No orders yet.";
return;
}

container.innerHTML = orders.map(order => {
let product = order.product ? `<div><strong>Product:</strong> ${order.product.name}</div><div>Metal: ${order.product.metal}</div><div>Weight: ${order.product.weight}g</div>${order.product.details ? `<div>${order.product.details}</div>` : ''}${order.product.hallmark ? `<div class=\"hallmark\"><strong>Hallmark:</strong> ${order.product.hallmark}</div>` : ''}` : '<div>Product details unavailable</div>';
return `<div style="margin-bottom:18px;padding:15px;border:1px solid #333;border-radius:14px;background:#121212;"><div><strong>Customer:</strong> ${order.customerName}</div><div><strong>Contact:</strong> ${order.contactNumber}</div><div><strong>Address:</strong> ${order.address}</div>${product}</div>`;
}).join('');
}

/* Cart View */

function viewCart(){

alert("Cart Items: " + cart.length);

}

/* Image Modal */

function openModal(src){

document.getElementById("imgModal").style.display="flex";

document.getElementById("modalImg").src = src;

}

function closeModal(){

document.getElementById("imgModal").style.display="none";

}

/* Admin Access */

if(window.location.hash == "#admin"){

let pass = prompt("Enter Admin Password");

if(pass == "saiom@1982"){

document.getElementById("adminPanel").style.display="block";

}else{

alert("Wrong Password");

}

}

/* Convert Google Drive Link */

function convertDriveLink(link) {
if (link.includes("drive.google.com")) {
let match = link.match(/\/d\/([a-zA-Z0-9_-]+)/);
if (match && match[1]) {
return "https://lh3.googleusercontent.com/d/" + match[1];
}
}
return link;
}

/* Add Product */

function addProduct(){

let name = document.getElementById("pname").value;

let weight = document.getElementById("pweight").value;

let metal = document.getElementById("pmetal").value;

let image = document.getElementById("pimg").value;

image = convertDriveLink(image);

let details = document.getElementById("pdetails").value;

let hallmark = document.getElementById("phallmark").value;

let purity = document.getElementById("ppurity").value;

let newProduct = {

id:Date.now(),

name:name,

weight:weight,

metal:metal,

image:image,

details: details,

hallmark: hallmark,

purity: purity,

rating:5,

reviews:0

};

products.push(newProduct);

localStorage.setItem("products",JSON.stringify(products));

renderProducts();

alert("Product Added");

}

/* Update Rates */

function updateRates(){

goldRate = document.getElementById("newGold").value;

silverRate = document.getElementById("newSilver").value;

localStorage.setItem("goldRate",goldRate);

localStorage.setItem("silverRate",silverRate);

document.getElementById("goldRate").innerText = goldRate;

document.getElementById("silverRate").innerText = silverRate;

renderProducts();

alert("Rates Updated");

}

</script>

</body>
</html>
