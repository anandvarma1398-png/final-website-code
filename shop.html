'
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sai Om Jewellers</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background: linear-gradient(135deg, #0a0a0a 0%, #1a1410 50%, #0a0a0a 100%);
color:#fff;
overflow-x:hidden;
font-family:'Cinzel', serif;
min-height:100vh;
}

/* Splash Screen */

#splash{
position:fixed;
width:100%;
height:100vh;
top:0;
left:0;
overflow:hidden;
}

#splash .overlay{
position:absolute;
width:100%;
height:100%;
background:radial-gradient(circle, transparent 40%, rgba(0,0,0,0.95));
}

#splash .wrapper{
text-align:center;
position:relative;
z-index:10;
}

#splash .ring{
position:absolute;
width:420px;
height:420px;
border-radius:50%;
border:1px solid rgba(212,175,55,0.25);
top:50%;
left:50%;
transform:translate(-50%,-50%);
animation:rotate 18s linear infinite;
}

#splash .ring::after{
content:'';
position:absolute;
inset:22px;
border-radius:50%;
border:1px dashed rgba(212,175,55,0.5);
}

#splash .light{
position:absolute;
top:50%;
left:-160%;
width:160%;
height:2px;
background:linear-gradient(
90deg,
transparent,
rgba(255,255,255,0.9),
rgba(212,175,55,0.4),
transparent
);
transform:translateY(-50%);
animation:shine 3s linear infinite;
}

#splash .center{
width:260px;
height:260px;
border-radius:50%;
background:rgba(0,0,0,0.7);
display:flex;
justify-content:center;
align-items:center;
margin:auto;
box-shadow:
0 0 50px rgba(212,175,55,0.18),
inset 0 0 30px rgba(212,175,55,0.12);
animation:zoom 1.5s ease;
}

#splash .logo{
font-size:95px;
color:#D4AF37;
letter-spacing:12px;
text-shadow:
0 0 15px rgba(212,175,55,0.8),
0 0 35px rgba(212,175,55,0.5);
}

#splash h1{
margin-top:55px;
color:#fff;
font-size:46px;
letter-spacing:10px;
animation:fadeUp 2s ease;
}

#splash p{
margin-top:18px;
color:#bdbdbd;
font-size:14px;
letter-spacing:6px;
animation:fadeUp 2.5s ease;
}

#splash .line{
width:0;
height:2px;
background:linear-gradient(to right, transparent, #D4AF37, transparent);
margin:40px auto;
animation:lineGrow 2s forwards;
}

#splash .loader{
display:flex;
justify-content:center;
gap:10px;
}

#splash .loader span{
width:8px;
height:8px;
border-radius:50%;
background:#D4AF37;
box-shadow:0 0 12px #D4AF37;
animation:bounce 0.8s infinite alternate;
}

#splash .loader span:nth-child(2){animation-delay:0.2s;}
#splash .loader span:nth-child(3){animation-delay:0.4s;}

@keyframes rotate{
from{transform:translate(-50%,-50%) rotate(0deg);}
to{transform:translate(-50%,-50%) rotate(360deg);}
}

@keyframes shine{
0%{left:-160%; opacity:0;}
50%{opacity:1;}
100%{left:160%; opacity:0;}
}

@keyframes zoom{
from{transform:scale(0.7); opacity:0;}
to{transform:scale(1); opacity:1;}
}

@keyframes fadeUp{
from{opacity:0; transform:translateY(25px);}
to{opacity:1; transform:translateY(0);}
}

@keyframes lineGrow{
from{width:0;}
to{width:360px;}
}

@keyframes bounce{
from{transform:translateY(0); opacity:0.4;}
to{transform:translateY(-10px); opacity:1;}
}

/* Main Content */

#main{
display:none;
}

/* Header */

header{
padding:20px;
background:#111;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid gold;
position:sticky;
top:0;
z-index:100;
}

header h1{
color:gold;
}

.top-bar{
display:flex;
justify-content:flex-end;
align-items:center;
padding:8px 16px 6px;
background:#111;
border-bottom:1px solid #222;
}

.header-actions{
display:flex;
gap:16px;
align-items:center;
}

.menu-container{
position:relative;
}

.menu-button{
width:34px;
height:34px;
border:1px solid gold;
border-radius:50%;
background:transparent;
color:#fff;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
}

.menu-button:hover{
background:rgba(255,255,255,0.08);
}

.menu-dropdown{
position:absolute;
top:calc(100% + 10px);
right:0;
background:#111;
border:1px solid #333;
border-radius:14px;
min-width:210px;
box-shadow:0 15px 40px rgba(0,0,0,0.35);
display:none;
z-index:200;
}

.menu-dropdown.active{
display:block;
}

.menu-dropdown button{
width:100%;
padding:12px 16px;
background:transparent;
border:none;
color:#fff;
text-align:left;
cursor:pointer;
font-weight:bold;
font-size:0.95rem;
}

.menu-dropdown button:hover{
background:#222;
}

.rate-panel{
display:flex;
gap:10px;
align-items:center;
}

.rate-card{
background:rgba(212,175,55,0.08);
border:1px solid rgba(212,175,55,0.2);
border-radius:14px;
padding:10px 14px;
min-width:120px;
box-shadow:0 10px 24px rgba(0,0,0,0.22);
}

.rate-card .rate-label{
font-size:0.68rem;
letter-spacing:0.16em;
text-transform:uppercase;
color:#f5e0a7;
margin-bottom:4px;
}

.rate-card .rate-value{
font-size:0.92rem;
font-weight:700;
color:#ffffff;
}

.rate-card .rate-value span{
color:#b8ff92;
}

.wishlist-btn{
padding:10px 18px;
background:transparent;
color:#fff;
border:1px solid gold;
border-radius:30px;
cursor:pointer;
font-weight:bold;
transition:all 0.25s ease;
}

.wishlist-btn:hover{
background:gold;
color:#000;
}

.product-detail{
font-size:0.95rem;
color:#ccc;
margin:12px 0;
line-height:1.5;
padding:10px;
background:rgba(212,175,55,0.05);
border-left:3px solid #D4AF37;
border-radius:6px;
}

.hallmark{
font-size:0.92rem;
color:#ffdd55;
margin-top:12px;
padding:10px;
background:rgba(255,221,85,0.08);
border:1px solid rgba(255,221,85,0.2);
border-radius:8px;
font-weight:600;
}

/* Search Bar */

.search-bar{
padding:20px;
background:linear-gradient(135deg, rgba(212,175,55,0.05) 0%, rgba(0,0,0,0.4) 100%);
display:flex;
justify-content:center;
border-bottom:1px solid rgba(212,175,55,0.1);
}

.search-bar input{
width:100%;
max-width:700px;
padding:16px 22px;
border-radius:12px;
border:1.5px solid rgba(212,175,55,0.25);
background:rgba(0,0,0,0.7);
color:#fff;
font-size:16px;
outline:none;
transition:all 0.3s ease;
backdrop-filter:blur(5px);
}

.search-bar input:focus{
border-color:#D4AF37;
box-shadow:0 0 20px rgba(212,175,55,0.3);
background:rgba(0,0,0,0.8);
}

.search-bar input::placeholder{
color:#888;
}

/* Categories */

.categories{
display:flex;
overflow:auto;
padding:20px;
gap:12px;
background:rgba(0,0,0,0.6);
border-bottom:1px solid rgba(212,175,55,0.1);
}

.categories button{
padding:12px 20px;
background:linear-gradient(135deg, #D4AF37 0%, #c99f2e 100%);
border:none;
cursor:pointer;
border-radius:30px;
font-weight:700;
font-size:0.95rem;
color:#000;
transition:all 0.3s ease;
box-shadow:0 4px 15px rgba(212,175,55,0.2);
min-width:auto;
}

.categories button:hover{
transform:translateY(-2px);
box-shadow:0 8px 25px rgba(212,175,55,0.4);
}

.categories button:active{
transform:translateY(0);
}

/* Product Grid */

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:28px;
padding:30px;
background:linear-gradient(135deg, rgba(0,0,0,0.6) 0%, rgba(212,175,55,0.02) 100%);
}

.card{
background:linear-gradient(135deg, rgba(212,175,55,0.08) 0%, rgba(0,0,0,0.6) 100%);
padding:20px;
border-radius:18px;
border:1.5px solid rgba(212,175,55,0.15);
transition:all 0.4s cubic-bezier(0.23, 1, 0.320, 1);
position:relative;
overflow:hidden;
box-shadow:0 10px 40px rgba(0,0,0,0.4);
}

.card::before{
content:'';
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;
background:linear-gradient(90deg, transparent, rgba(212,175,55,0.1), transparent);
transition:left 0.5s ease;
}

.card:hover::before{
left:100%;
}

.card:hover{
transform:translateY(-8px);
border-color:#D4AF37;
box-shadow:0 20px 60px rgba(212,175,55,0.25);
background:linear-gradient(135deg, rgba(212,175,55,0.15) 0%, rgba(0,0,0,0.7) 100%);
}

.card img{
width:100%;
height:240px;
object-fit:cover;
border-radius:14px;
cursor:pointer;
transition:all 0.3s ease;
}

.card:hover img{
transform:scale(1.05);
}

.card h3{
margin-top:16px;
color:#D4AF37;
font-size:1.15rem;
letter-spacing:0.5px;
}

.card p{
color:#ccc;
font-size:0.95rem;
margin:8px 0;
line-height:1.4;
}

.price{
font-size:22px;
margin:12px 0;
color:#b8ff92;
font-weight:700;
}

.btns{
display:flex;
gap:12px;
flex-wrap:wrap;
margin-top:16px;
}

.btns button{
flex:1;
padding:12px;
border:none;
cursor:pointer;
border-radius:10px;
font-weight:700;
font-size:0.95rem;
transition:all 0.3s ease;
min-width:80px;
text-transform:uppercase;
letter-spacing:0.5px;
}

.cart-btn{
background:linear-gradient(135deg, #D4AF37 0%, #c99f2e 100%);
color:#000;
box-shadow:0 4px 15px rgba(212,175,55,0.2);
}

.cart-btn:hover{
transform:translateY(-2px);
box-shadow:0 8px 25px rgba(212,175,55,0.4);
}

.wish-btn{
background:linear-gradient(135deg, #ff0066 0%, #cc0052 100%);
color:#fff;
box-shadow:0 4px 15px rgba(255,0,102,0.2);
}

.wish-btn:hover{
transform:translateY(-2px);
box-shadow:0 8px 25px rgba(255,0,102,0.4);
}

.buy-btn{
background:linear-gradient(135deg, #00cc66 0%, #00a84d 100%);
color:#fff;
box-shadow:0 4px 15px rgba(0,204,102,0.2);
}

.buy-btn:hover{
transform:translateY(-2px);
box-shadow:0 8px 25px rgba(0,204,102,0.4);
}

/* Floating Cart */

.floating-cart{
position:fixed;
bottom:30px;
right:30px;
background:linear-gradient(135deg, #D4AF37 0%, #c99f2e 100%);
color:#000;
width:70px;
height:70px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:28px;
cursor:pointer;
z-index:999;
box-shadow:0 10px 40px rgba(212,175,55,0.4);
transition:all 0.3s ease;
}

.floating-cart:hover{
transform:scale(1.1);
box-shadow:0 15px 50px rgba(212,175,55,0.5);
}

.badge{
position:absolute;
top:-8px;
right:-8px;
background:linear-gradient(135deg, #ff0066 0%, #cc0052 100%);
color:#fff;
width:28px;
height:28px;
font-size:13px;
font-weight:700;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
box-shadow:0 4px 12px rgba(255,0,102,0.3);
}

/* Modal */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100vh;
background:rgba(0,0,0,0.85);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
backdrop-filter:blur(5px);
animation:fadeInModal 0.3s ease;
}

@keyframes fadeInModal{
from{opacity:0;}
to{opacity:1;}
}

.modal img{
max-width:90%;
max-height:90%;
border:3px solid #D4AF37;
border-radius:16px;
box-shadow:0 20px 80px rgba(212,175,55,0.3);
}

.order-card{
background:linear-gradient(135deg, rgba(212,175,55,0.08) 0%, rgba(0,0,0,0.9) 100%);
border-radius:24px;
padding:40px;
max-width:520px;
width:95%;
position:relative;
box-shadow:0 30px 100px rgba(0,0,0,0.7);
border:1.5px solid rgba(212,175,55,0.2);
animation:slideInCard 0.4s cubic-bezier(0.23, 1, 0.320, 1);
}

@keyframes slideInCard{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

@keyframes slideInRight{
from{opacity:0; transform:translateX(100px);}
to{opacity:1; transform:translateX(0);}
}

@keyframes slideOutRight{
from{opacity:1; transform:translateX(0);}
to{opacity:0; transform:translateX(100px);}
}

.order-card h2{
color:#D4AF37;
margin-bottom:20px;
font-size:1.4rem;
letter-spacing:1px;
}

.close-order{
position:absolute;
top:20px;
right:20px;
color:#D4AF37;
font-size:28px;
cursor:pointer;
transition:all 0.3s ease;
}

.close-order:hover{
transform:rotate(90deg);
}

.order-form{
display:flex;
flex-direction:column;
gap:16px;
margin-top:24px;
}

.order-form input,
.order-form textarea,
.order-form select{
padding:14px 16px;
border-radius:12px;
border:1.5px solid rgba(212,175,55,0.2);
background:rgba(0,0,0,0.6);
color:#fff;
outline:none;
font-family:inherit;
transition:all 0.3s ease;
font-size:0.95rem;
}

.order-form input::placeholder,
.order-form textarea::placeholder{
color:#888;
}

.order-form input:focus,
.order-form textarea:focus,
.order-form select:focus{
border-color:#D4AF37;
box-shadow:0 0 20px rgba(212,175,55,0.2);
background:rgba(0,0,0,0.7);
}

.order-form button{
padding:14px;
border:none;
border-radius:12px;
background:linear-gradient(135deg, #D4AF37 0%, #c99f2e 100%);
color:#000;
font-weight:700;
cursor:pointer;
font-size:1rem;
transition:all 0.3s ease;
text-transform:uppercase;
letter-spacing:1px;
box-shadow:0 4px 20px rgba(212,175,55,0.2);
margin-top:8px;
}

.order-form button:hover{
transform:translateY(-2px);
box-shadow:0 8px 30px rgba(212,175,55,0.35);
}

.order-showcase{
margin-top:15px;
line-height:1.7;
color:#ddd;
}

.admin-order-card{
margin-top:16px;
padding:18px;
background:#121212;
border:1px solid #333;
border-radius:16px;
}

/* Admin Panel */

#adminPanel{
display:none;
padding:30px;
background:linear-gradient(135deg, rgba(212,175,55,0.08) 0%, rgba(0,0,0,0.9) 100%);
border-top:2px solid rgba(212,175,55,0.3);
}

#adminPanel h2{
color:#D4AF37;
margin-bottom:20px;
font-size:1.3rem;
letter-spacing:1px;
}

.admin-input{
padding:12px 16px;
margin:12px 0;
width:100%;
border-radius:10px;
border:1.5px solid rgba(212,175,55,0.2);
background:rgba(0,0,0,0.6);
color:#fff;
font-family:inherit;
transition:all 0.3s ease;
}

.admin-input:focus{
border-color:#D4AF37;
box-shadow:0 0 15px rgba(212,175,55,0.2);
}

.admin-btn{
padding:12px 24px;
margin:12px 0;
background:linear-gradient(135deg, #D4AF37 0%, #c99f2e 100%);
border:none;
cursor:pointer;
font-weight:700;
border-radius:10px;
color:#000;
transition:all 0.3s ease;
box-shadow:0 4px 15px rgba(212,175,55,0.2);
}

.admin-btn:hover{
transform:translateY(-2px);
box-shadow:0 8px 25px rgba(212,175,55,0.3);
}

#ordersSection{
margin-top:30px;
}

#ordersSection h3{
color:#D4AF37;
margin-bottom:16px;
font-size:1.1rem;
}

#orderList{
color:#ccc;
}

.admin-order-card{
margin-top:16px;
padding:18px;
background:rgba(0,0,0,0.6);
border:1.5px solid rgba(212,175,55,0.15);
border-radius:12px;
}

@media(max-width:768px){

.logo{
font-size:35px;
}

header{
flex-direction:column;
gap:10px;
}

}

</style>
</head>
<body>

<!-- Splash Screen -->

<div id="splash">
<div class="overlay"></div>
<div class="wrapper">
<div class="ring"></div>
<div class="light"></div>
<div class="center">
<div class="logo">SOJ</div>
</div>
<h1>SAI OM JEWELLERS</h1>
<p>LUXURY • TRUST • PURITY</p>
<div class="line"></div>
<div class="loader">
<span></span>
<span></span>
<span></span>
</div>
</div>
</div>

<!-- Main Content -->

<div id="main">

<!-- Header -->

<div class="top-bar">
<div class="menu-container">
<button class="menu-button" onclick="toggleHeaderMenu()">⋮</button>
<div class="menu-dropdown" id="headerMenu">
<button onclick="openCustomerCare()">Customer Care</button>
<button onclick="openWhatsAppMessage()">WhatsApp Message</button>
</div>
</div>
</div>

<header>
<h1>Sai Om Jewellers</h1>

<div class="header-actions">
<div class="rate-panel">
<div class="rate-card">
<div class="rate-label">Gold Rate</div>
<div class="rate-value">₹ <span id="goldRate">6500</span> /g</div>
</div>
<div class="rate-card">
<div class="rate-label">Silver Rate</div>
<div class="rate-value">₹ <span id="silverRate">80</span> /g</div>
</div>
</div>
<button class="wishlist-btn" onclick="openWishlist()">Wishlist (<span id="wishlistCount">0</span>)</button>
</div>
</header>

<!-- Search -->
<div class="search-bar">
<input type="search" id="productSearch" placeholder="Search catalog by name, metal, or category..." oninput="searchProducts()">
</div>

<!-- Categories -->

<div class="categories">
<button onclick="filterByMetal('All')">All</button>
<button onclick="filterByMetal('Gold')">Gold</button>
<button onclick="filterByMetal('Silver')">Silver</button>
<button onclick="filterByMetal('Mani')">Mani</button>
<button onclick="filterByMetal('Gifting')">Gifting Item</button>
</div>

<!-- Products -->

<div class="products" id="productContainer"></div>

<!-- Floating Cart -->

<div class="floating-cart" onclick="viewCart()">
🛒
<div class="badge" id="cartCount">0</div>
</div>

<!-- Image Modal -->

<div class="modal" id="imgModal" onclick="closeModal()">
<img id="modalImg">
</div>

<div class="modal" id="orderModal" onclick="if(event.target===this) closeOrderModal()">
<div class="order-card">
<div class="close-order" onclick="closeOrderModal()">✕</div>
<h2>Place Your Order</h2>
<div class="order-product" id="orderProductDetails"></div>
<form class="order-form" onsubmit="event.preventDefault(); submitOrder();">
<input type="text" id="customerName" placeholder="Customer Name" required>
<input type="email" id="customerEmail" placeholder="Email Address" required>
<input type="tel" id="customerContact" placeholder="Contact Number" required>
<input type="text" id="customerPincode" placeholder="Pincode" required>
<textarea id="customerAddress" placeholder="Address" rows="4" required></textarea>
<select id="paymentMethod" required>
<option value="COD">Cash on Delivery (COD)</option>
</select>
<button type="submit">Place Order</button>
</form>
</div>
</div>

<div class="modal" id="cartModal" onclick="if(event.target===this) closeCartModal()">
<div class="order-card" style="max-width:640px; width:100%;">
<div class="close-order" onclick="closeCartModal()">✕</div>
<h2>Your Cart</h2>
<div id="cartItemsList" style="margin-top:16px; max-height:320px; overflow:auto; color:#fff;"></div>
<div id="cartTotal" style="margin-top:18px; font-size:1rem; font-weight:700; color:#fff;"></div>
<button type="button" class="wishlist-btn" style="width:100%; margin-top:20px;" onclick="checkoutCart()">Checkout</button>
</div>
</div>

<div class="modal" id="wishlistModal" onclick="if(event.target===this) closeWishlistModal()">
<div class="order-card" style="max-width:640px; width:100%;">
<div class="close-order" onclick="closeWishlistModal()">✕</div>
<h2>My Wishlist</h2>
<div id="wishlistItemsList" style="margin-top:16px; max-height:380px; overflow-y:auto; color:#fff;"></div>
</div>
</div>

<!-- Admin Panel -->

<div id="adminPanel">
<h2>Admin Panel</h2>

<input type="text" id="pname" class="admin-input" placeholder="Product Name">

<input type="number" id="pweight" class="admin-input" placeholder="Weight (grams)">

<select id="pmetal" class="admin-input" onchange="updateAdminCategories()" required>
<option value="">Select Product Type</option>
<option value="Gold">Gold</option>
<option value="Silver">Silver</option>
<option value="Mani">Mani</option>
</select>

<select id="pcategory" class="admin-input" onchange="updateAdminManiSizes()" required disabled>
<option value="">Select Category</option>
</select>

<select id="pmaniSize" class="admin-input" style="display:none;" disabled>
<option value="">Select Mani Size/Type</option>
</select>

<select id="pgifting" class="admin-input">
<option value="No">Gifting Item? No</option>
<option value="Yes">Gifting Item? Yes</option>
</select>

function getPromptSelection(items, message){
let options = items.map((item,index)=>`${index + 1}. ${item}`).join("\n");
let response = prompt(`${message}\n\n${options}\n\nEnter the number or exact name:`);
if(response === null) return null;
response = response.trim();
if(!response) return null;
let index = parseInt(response, 10);
if(!isNaN(index) && index >= 1 && index <= items.length) return items[index - 1];
let match = items.find(item => item.toLowerCase() === response.toLowerCase());
return match || null;
}

function requestQuantity(product){
if(product.weight){

}

 if(quantityValue === null) return null;
 let quantity = parseFloat(quantityValue);
 if(isNaN(quantity) || quantity <= 0){
  alert('Please enter a valid quantity in grams.');
  return null;
 }
 return quantity;
}
return 1;
}

/* Convert Google Drive Link */

function convertDriveLink(link) {
if (link.includes("drive.google.com")) {
let match = link.match(/\/d\/([a-zA-Z0-9_-]+)/);
if (match && match[1]) {
return "https://lh3.googleusercontent.com/d/" + match[1];
}
}
return link;
}

}

/* Add Product */

function addProduct(){

let name = document.getElementById("pname").value.trim();
let weight = document.getElementById("pweight").value.trim();
let metal = document.getElementById("pmetal").value;
let category = document.getElementById("pcategory").value;
let maniSize = document.getElementById("pmaniSize").value;
let gifting = document.getElementById("pgifting") ? document.getElementById("pgifting").value : 'No';
let image = document.getElementById("pimg").value;
image = convertDriveLink(image);
let details = document.getElementById("pdetails").value;
let hallmark = document.getElementById("phallmark").value;
let purity = document.getElementById("ppurity").value;

if(!name || !metal || !category){
alert("Please complete the product name, metal, and category fields.");
return;
}

if(metal === 'Mani'){
if(!maniSize){
alert("Please select the Mani size/type.");
return;
}
} else {
if(!weight || isNaN(parseFloat(weight)) || parseFloat(weight) <= 0){
alert("Please enter a valid weight for Gold or Silver products.");
return;
}
}

let newProduct = {

id:Date.now(),

name:name,

metal:metal,

category:category,

weight: metal === 'Mani' ? null : parseFloat(weight),

maniSize: metal === 'Mani' ? maniSize : null,

gifting: gifting === 'Yes',

image:image,

details: details,

hallmark: hallmark,

purity: purity,

rating:5,

reviews:0

};

products.push(newProduct);

localStorage.setItem("products",JSON.stringify(products));

renderProducts();

document.getElementById("pname").value = "";
document.getElementById("pweight").value = "";
document.getElementById("pmetal").value = "";
document.getElementById("pcategory").value = "";
document.getElementById("pimg").value = "";
document.getElementById("pdetails").value = "";
document.getElementById("phallmark").value = "";
document.getElementById("ppurity").value = "";

alert("✓ Product Added Successfully!\n\nThis product is now visible to all users.");

}

/* Update Rates */

function updateRates(){

let newGold = document.getElementById("newGold").value;
let newSilver = document.getElementById("newSilver").value;

if(!newGold || !newSilver || isNaN(newGold) || isNaN(newSilver)){
alert("Please enter valid rates for both gold and silver.");
return;
}

goldRate = newGold;
silverRate = newSilver;

localStorage.setItem("goldRate",goldRate);
localStorage.setItem("silverRate",silverRate);

document.getElementById("goldRate").innerText = goldRate;
document.getElementById("silverRate").innerText = silverRate;

document.getElementById("newGold").value = "";
document.getElementById("newSilver").value = "";

renderProducts();

alert("✓ Rates Updated Successfully!\n\nGold: ₹" + goldRate + "/g\nSilver: ₹" + silverRate + "/g\n\nAll users can see the new rates.");

}
