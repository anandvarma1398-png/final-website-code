'
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sai Om Jewellers</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background: radial-gradient(circle at center, #111 0%, #000 70%, #000 100%);
color:#fff;
overflow-x:hidden;
font-family:'Cinzel', serif;
}

/* Splash Screen */

#splash{
position:fixed;
width:100%;
height:100vh;
top:0;
left:0;
overflow:hidden;
}

#splash .overlay{
position:absolute;
width:100%;
height:100%;
background:radial-gradient(circle, transparent 40%, rgba(0,0,0,0.95));
}

#splash .wrapper{
text-align:center;
position:relative;
z-index:10;
}

#splash .ring{
position:absolute;
width:420px;
height:420px;
border-radius:50%;
border:1px solid rgba(212,175,55,0.25);
top:50%;
left:50%;
transform:translate(-50%,-50%);
animation:rotate 18s linear infinite;
}

#splash .ring::after{
content:'';
position:absolute;
inset:22px;
border-radius:50%;
border:1px dashed rgba(212,175,55,0.5);
}

#splash .light{
position:absolute;
top:50%;
left:-160%;
width:160%;
height:2px;
background:linear-gradient(
90deg,
transparent,
rgba(255,255,255,0.9),
rgba(212,175,55,0.4),
transparent
);
transform:translateY(-50%);
animation:shine 3s linear infinite;
}

#splash .center{
width:260px;
height:260px;
border-radius:50%;
background:rgba(0,0,0,0.7);
display:flex;
justify-content:center;
align-items:center;
margin:auto;
box-shadow:
0 0 50px rgba(212,175,55,0.18),
inset 0 0 30px rgba(212,175,55,0.12);
animation:zoom 1.5s ease;
}

#splash .logo{
font-size:95px;
color:#D4AF37;
letter-spacing:12px;
text-shadow:
0 0 15px rgba(212,175,55,0.8),
0 0 35px rgba(212,175,55,0.5);
}

#splash h1{
margin-top:55px;
color:#fff;
font-size:46px;
letter-spacing:10px;
animation:fadeUp 2s ease;
}

#splash p{
margin-top:18px;
color:#bdbdbd;
font-size:14px;
letter-spacing:6px;
animation:fadeUp 2.5s ease;
}

#splash .line{
width:0;
height:2px;
background:linear-gradient(to right, transparent, #D4AF37, transparent);
margin:40px auto;
animation:lineGrow 2s forwards;
}

#splash .loader{
display:flex;
justify-content:center;
gap:10px;
}

#splash .loader span{
width:8px;
height:8px;
border-radius:50%;
background:#D4AF37;
box-shadow:0 0 12px #D4AF37;
animation:bounce 0.8s infinite alternate;
}

#splash .loader span:nth-child(2){animation-delay:0.2s;}
#splash .loader span:nth-child(3){animation-delay:0.4s;}

@keyframes rotate{
from{transform:translate(-50%,-50%) rotate(0deg);}
to{transform:translate(-50%,-50%) rotate(360deg);}
}

@keyframes shine{
0%{left:-160%; opacity:0;}
50%{opacity:1;}
100%{left:160%; opacity:0;}
}

@keyframes zoom{
from{transform:scale(0.7); opacity:0;}
to{transform:scale(1); opacity:1;}
}

@keyframes fadeUp{
from{opacity:0; transform:translateY(25px);}
to{opacity:1; transform:translateY(0);}
}

@keyframes lineGrow{
from{width:0;}
to{width:360px;}
}

@keyframes bounce{
from{transform:translateY(0); opacity:0.4;}
to{transform:translateY(-10px); opacity:1;}
}

/* Main Content */

#main{
display:none;
}

/* Header */

header{
padding:20px;
background:#111;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid gold;
position:sticky;
top:0;
z-index:100;
}

header h1{
color:gold;
}

.top-bar{
display:flex;
justify-content:flex-end;
align-items:center;
padding:8px 16px 6px;
background:#111;
border-bottom:1px solid #222;
}

.header-actions{
display:flex;
gap:16px;
align-items:center;
}

.menu-container{
position:relative;
}

.menu-button{
width:34px;
height:34px;
border:1px solid gold;
border-radius:50%;
background:transparent;
color:#fff;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
}

.menu-button:hover{
background:rgba(255,255,255,0.08);
}

.menu-dropdown{
position:absolute;
top:calc(100% + 10px);
right:0;
background:#111;
border:1px solid #333;
border-radius:14px;
min-width:210px;
box-shadow:0 15px 40px rgba(0,0,0,0.35);
display:none;
z-index:200;
}

.menu-dropdown.active{
display:block;
}

.menu-dropdown button{
width:100%;
padding:12px 16px;
background:transparent;
border:none;
color:#fff;
text-align:left;
cursor:pointer;
font-weight:bold;
font-size:0.95rem;
}

.menu-dropdown button:hover{
background:#222;
}

.rate-panel{
display:flex;
gap:12px;
align-items:center;
}

.rate-card{
background:rgba(212,175,55,0.08);
border:1px solid rgba(212,175,55,0.2);
border-radius:16px;
padding:14px 18px;
min-width:140px;
box-shadow:0 12px 30px rgba(0,0,0,0.25);
}

.rate-card .rate-label{
font-size:0.72rem;
letter-spacing:0.18em;
text-transform:uppercase;
color:#f5e0a7;
margin-bottom:6px;
}

.rate-card .rate-value{
font-size:1rem;
font-weight:700;
color:#ffffff;
}

.rate-card .rate-value span{
color:#b8ff92;
}

.wishlist-btn{
padding:10px 18px;
background:transparent;
color:#fff;
border:1px solid gold;
border-radius:30px;
cursor:pointer;
font-weight:bold;
transition:all 0.25s ease;
}

.wishlist-btn:hover{
background:gold;
color:#000;
}

.product-detail{
font-size:0.95rem;
color:#ccc;
margin:10px 0;
}

.hallmark{
font-size:0.92rem;
color:#ffdd55;
margin-top:8px;
}

/* Search Bar */

.search-bar{
padding:15px;
background:#111;
display:flex;
justify-content:center;
}

.search-bar input{
width:100%;
max-width:640px;
padding:14px 18px;
border-radius:999px;
border:1px solid #333;
background:#0d0d0d;
color:#fff;
font-size:16px;
outline:none;
}

.search-bar input::placeholder{
color:#777;
}

/* Categories */

.categories{
display:flex;
overflow:auto;
padding:15px;
gap:10px;
background:#111;
}

.categories button{
padding:8px 16px;
background:gold;
border:none;
cursor:pointer;
border-radius:26px;
font-weight:bold;
font-size:0.95rem;
min-width:100px;
}

/* Product Grid */

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#111;
padding:15px;
border-radius:15px;
border:1px solid #333;
transition:0.3s;
position:relative;
}

.card:hover{
transform:translateY(-5px);
border-color:gold;
}

.card img{
width:100%;
height:220px;
object-fit:cover;
border-radius:10px;
cursor:pointer;
}

.card h3{
margin-top:10px;
color:gold;
}

.price{
font-size:20px;
margin:10px 0;
color:#00ff99;
}

.btns{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.btns button{
flex:1;
padding:8px;
border:none;
cursor:pointer;
border-radius:5px;
font-weight:bold;
font-size:0.95rem;
}

.cart-btn{
background:gold;
}

.wish-btn{
background:#ff0066;
color:#fff;
}

.buy-btn{
background:#00cc66;
color:#fff;
}

/* Floating Cart */

.floating-cart{
position:fixed;
bottom:20px;
right:20px;
background:gold;
color:#000;
width:60px;
height:60px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:25px;
cursor:pointer;
z-index:999;
}

.badge{
position:absolute;
top:-5px;
right:-5px;
background:red;
color:#fff;
width:22px;
height:22px;
font-size:12px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
}

/* Modal */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100vh;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
}

.modal img{
max-width:90%;
max-height:90%;
border:5px solid gold;
border-radius:10px;
}

.order-card{
background:#111;
border-radius:20px;
padding:30px;
max-width:520px;
width:100%;
position:relative;
box-shadow:0 30px 80px rgba(0,0,0,0.35);
}

.close-order{
position:absolute;
top:18px;
right:18px;
color:#fff;
font-size:18px;
cursor:pointer;
}

.order-form{
display:flex;
flex-direction:column;
gap:15px;
margin-top:20px;
}

.order-form input,
.order-form textarea{
padding:14px;
border-radius:12px;
border:1px solid #333;
background:#0d0d0d;
color:#fff;
outline:none;
}

.order-form button{
padding:14px;
border:none;
border-radius:50px;
background:gold;
color:#000;
font-weight:bold;
cursor:pointer;
}

.order-showcase{
margin-top:15px;
line-height:1.7;
color:#ddd;
}

.admin-order-card{
margin-top:16px;
padding:18px;
background:#121212;
border:1px solid #333;
border-radius:16px;
}

/* Admin Panel */

#adminPanel{
display:none;
padding:20px;
background:#111;
border-top:2px solid gold;
}

.admin-input{
padding:10px;
margin:10px 0;
width:100%;
}

.admin-btn{
padding:10px;
background:gold;
border:none;
cursor:pointer;
font-weight:bold;
}

@media(max-width:768px){

.logo{
font-size:35px;
}

header{
flex-direction:column;
gap:10px;
}

}

</style>
</head>
<body>

<!-- Splash Screen -->

<div id="splash">
<div class="overlay"></div>
<div class="wrapper">
<div class="ring"></div>
<div class="light"></div>
<div class="center">
<div class="logo">SOJ</div>
</div>
<h1>SAI OM JEWELLERS</h1>
<p>LUXURY • TRUST • PURITY</p>
<div class="line"></div>
<div class="loader">
<span></span>
<span></span>
<span></span>
</div>
</div>
</div>

<!-- Main Content -->

<div id="main">

<!-- Header -->

<div class="top-bar">
<div class="menu-container">
<button class="menu-button" onclick="toggleHeaderMenu()">⋮</button>
<div class="menu-dropdown" id="headerMenu">
<button onclick="openCustomerCare()">Customer Care</button>
<button onclick="openWhatsAppMessage()">WhatsApp Message</button>
</div>
</div>
</div>

<header>
<h1>Sai Om Jewellers</h1>

<div class="header-actions">
<div class="rate-panel">
<div class="rate-card">
<div class="rate-label">Gold Rate</div>
<div class="rate-value">₹ <span id="goldRate">6500</span> /g</div>
</div>
<div class="rate-card">
<div class="rate-label">Silver Rate</div>
<div class="rate-value">₹ <span id="silverRate">80</span> /g</div>
</div>
</div>
<button class="wishlist-btn" onclick="openWishlist()">Wishlist (<span id="wishlistCount">0</span>)</button>
</div>
</header>

<!-- Search -->
<div class="search-bar">
<input type="search" id="productSearch" placeholder="Search catalog by name, metal, or category..." oninput="searchProducts()">
</div>

<!-- Categories -->

<div class="categories">
<button onclick="filterByMetal('All')">All</button>
<button onclick="filterByMetal('Gold')">Gold</button>
<button onclick="filterByMetal('Silver')">Silver</button>
<button onclick="filterByMetal('Mani')">Mani</button>
<button onclick="filterByMetal('Gifting')">Gifting Item</button>
</div>

<!-- Products -->

<div class="products" id="productContainer"></div>

<!-- Floating Cart -->

<div class="floating-cart" onclick="viewCart()">
🛒
<div class="badge" id="cartCount">0</div>
</div>

<!-- Image Modal -->

<div class="modal" id="imgModal" onclick="closeModal()">
<img id="modalImg">
</div>

<div class="modal" id="orderModal" onclick="if(event.target===this) closeOrderModal()">
<div class="order-card">
<div class="close-order" onclick="closeOrderModal()">✕</div>
<h2>Place Your Order</h2>
<div class="order-product" id="orderProductDetails"></div>
<form class="order-form" onsubmit="event.preventDefault(); submitOrder();">
<input type="text" id="customerName" placeholder="Customer Name" required>
<input type="tel" id="customerContact" placeholder="Contact Number" required>
<textarea id="customerAddress" placeholder="Address" rows="4" required></textarea>
<button type="submit">Place Order</button>
</form>
</div>
</div>

<!-- Admin Panel -->

<div id="adminPanel">
<h2>Admin Panel</h2>

<input type="text" id="pname" class="admin-input" placeholder="Product Name">

<input type="number" id="pweight" class="admin-input" placeholder="Weight (grams)">

<select id="pmetal" class="admin-input" onchange="updateAdminCategories()" required>
<option value="">Select Product Type</option>
<option value="Gold">Gold</option>
<option value="Silver">Silver</option>
<option value="Mani">Mani</option>
</select>

<select id="pcategory" class="admin-input" onchange="updateAdminManiSizes()" required disabled>
<option value="">Select Category</option>
</select>

<select id="pmaniSize" class="admin-input" style="display:none;" disabled>
<option value="">Select Mani Size/Type</option>
</select>

<select id="pgifting" class="admin-input">
<option value="No">Gifting Item? No</option>
<option value="Yes">Gifting Item? Yes</option>
</select>

<input type="text" id="pimg" class="admin-input" placeholder="Image URL">

<textarea id="pdetails" class="admin-input" placeholder="Product Details" rows="3"></textarea>

<input type="text" id="phallmark" class="admin-input" placeholder="Hallmark Information">

<input type="text" id="ppurity" class="admin-input" placeholder="Purity (e.g., 22K, 24K, 18K)">

<button class="admin-btn" onclick="addProduct()">
Add Product
</button>

<hr>

<input type="number" id="newGold" class="admin-input" placeholder="Update Gold Rate">

<input type="number" id="newSilver" class="admin-input" placeholder="Update Silver Rate">

<button class="admin-btn" onclick="updateRates()">
Update Rates
</button>

<div id="ordersSection">
<h3>Orders</h3>
<div id="orderList">No orders yet.</div>
</div>

</div>

<script>

/* 2 seconds splash screen */

window.onload = function(){
setTimeout(function(){
document.getElementById("splash").style.display = "none";
document.getElementById("main").style.display = "block";
}, 3000);
}

/* Scroll to products */

function scrollToProducts(){
document.getElementById("productContainer").scrollIntoView({behavior:"smooth", block:"start"});
}

/* Product Data */

let products = JSON.parse(localStorage.getItem("products")) || [

{
id:1,
name:"Luxury Gold Ring",
metal:"Gold",
category:"Ring",
weight:12,
image:"https://images.unsplash.com/photo-1617038220319-276d3cfab638",
rating:4.8,
reviews:120
},

{
id:2,
name:"Silver Necklace",
metal:"Silver",
category:"Necklace",
weight:30,
image:"https://images.unsplash.com/photo-1605100804763-247f67b3557e",
rating:4.5,
reviews:80
}

];

const goldCategories = [
"Necklace",
"Pendant",
"Watti",
"Short Mangalsutra",
"Long Mangalsutra",
"Choker",
"Gold Mani",
"Chain",
"Bracelet & Kada",
"Earring",
"Bali",
"Kanvel",
"Tops",
"Ring",
"Bangles",
"Nath",
"Nose Ring"
];

const silverCategories = [
"Chain",
"Gents Ring",
"Ladies Ring",
"Tops",
"Payal",
"Bracelet",
"Kada",
"Utensils",
"Murti"
];

const maniCategories = {
"Gol Mani":["20/1 gm","16/1 gm","14/1 gm","12/1 gm"],
"Machine Mani":["12/1 gm","10/1 gm","8/1 gm","6/1 gm","4/1 gm","2/1 gm","1/1 gm"],
"Pungli Mani":["8/1 gm","6/1 gm"],
"Karle Mani":["10/1 gm","8/1 gm"],
"Nakshi Mani":["10/1 gm","8/1 gm"]
};

/* Rates */

let goldRate = localStorage.getItem("goldRate") || 6500;
let silverRate = localStorage.getItem("silverRate") || 80;

document.getElementById("goldRate").innerText = goldRate;
document.getElementById("silverRate").innerText = silverRate;

/* Cart */

let cart = JSON.parse(localStorage.getItem("cart")) || [];
if(Array.isArray(cart) && cart.some(item => typeof item === 'number')){
 cart = cart.map(item => typeof item === 'number' ? { id: item, quantity: 1 } : item);
}
let wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];
let orders = JSON.parse(localStorage.getItem("orders")) || [];
let currentOrderProductId = null;
let selectedOrderQuantity = null;
let currentFilter = null;
let currentSearch = "";

function getVisibleProducts(){
let result = products;

if(currentFilter){
if(currentFilter.type === 'metal'){
result = result.filter(p => p.metal === currentFilter.value);
} else if(currentFilter.type === 'mani'){
result = result.filter(p => p.metal === 'Mani' && p.category === currentFilter.category && p.maniSize === currentFilter.size);
} else if(currentFilter.type === 'gifting'){
result = result.filter(p => p.gifting === true);
}
}

if(currentSearch){
const query = currentSearch.toLowerCase();
result = result.filter(p => {
return p.name.toLowerCase().includes(query) ||
(p.category && p.category.toLowerCase().includes(query)) ||
(p.metal && p.metal.toLowerCase().includes(query)) ||
(p.details && p.details.toLowerCase().includes(query));
});
}

return result;
}

function saveCart(){
localStorage.setItem("cart",JSON.stringify(cart));
document.getElementById("cartCount").innerText = cart.length;
}

function saveWishlist(){
localStorage.setItem("wishlist",JSON.stringify(wishlist));
document.getElementById("wishlistCount").innerText = wishlist.length;
}

function saveOrders(){
localStorage.setItem("orders",JSON.stringify(orders));
}

saveCart();
saveWishlist();
displayOrders();

function getPromptSelection(items, message){
let options = items.map((item,index)=>`${index + 1}. ${item}`).join("\n");
let response = prompt(`${message}\n\n${options}\n\nEnter the number or exact name:`);
if(response === null) return null;
response = response.trim();
if(!response) return null;
let index = parseInt(response, 10);
if(!isNaN(index) && index >= 1 && index <= items.length) return items[index - 1];
let match = items.find(item => item.toLowerCase() === response.toLowerCase());
return match || null;
}

function toggleHeaderMenu(){
let menu = document.getElementById("headerMenu");
if(menu){
menu.classList.toggle("active");
}
}

function closeHeaderMenu(){
let menu = document.getElementById("headerMenu");
if(menu){
menu.classList.remove("active");
}
}

document.addEventListener("click", function(event){
let menu = document.getElementById("headerMenu");
if(!menu) return;
let target = event.target;
if(target.closest && !target.closest('.menu-container')){
menu.classList.remove('active');
}
});

function openCustomerCare(){
closeHeaderMenu();
window.location.href = 'tel:9112100969';
}

function openWhatsAppMessage(){
closeHeaderMenu();
let message = encodeURIComponent('Hello Sai Om Jewellers');
window.open(`https://wa.me/9112100969?text=${message}`, '_blank');
}

/* Filter Products by Metal */

function filterByMetal(metal){
if(metal === 'All'){
currentFilter = null;
renderProducts();
return;
}

if(metal === 'Mani'){
let category = getPromptSelection(Object.keys(maniCategories), 'Select Mani category');
if(!category) return;
let size = getPromptSelection(maniCategories[category], `Select size/type for ${category}`);
if(!size) return;
currentFilter = {
 type: 'mani',
 category: category,
 size: size
};
renderProducts();
return;
}

if(metal === 'Gifting'){
 currentFilter = { type: 'gifting' };
 renderProducts();
 return;
}

currentFilter = {
 type: 'metal',
 value: metal
};
 renderProducts();
}

/* Render Products */

function renderProducts(){

let container = document.getElementById("productContainer");

container.innerHTML = "";

let productsToDisplay = getVisibleProducts();

if(productsToDisplay.length === 0){
container.innerHTML = `<div style="color:#ccc; padding:40px; font-size:18px; text-align:center; width:100%;">No products found.</div>`;
return;
}

productsToDisplay.forEach(product=>{

let wishLabel = wishlist.includes(product.id) ? '♥ Added' : '♡ Wishlist';

container.innerHTML += `

<div class="card">

<img src="${product.image}"
onclick="openModal('${product.image}')">

<h3>${product.name}</h3>

<p>Product No: SOJ${product.id}</p>

<p>Metal: ${product.metal}</p>

${product.category ? `<p>Category: ${product.category}</p>` : ''}

${product.gifting ? `<p style="color:#ffd700; font-weight:bold;">Gifting Item</p>` : ''}

${product.weight ? `<p>Weight: ${product.weight}g</p>` : ''}

${product.maniSize ? `<p>Size/Type: ${product.maniSize}</p>` : ''}

${product.purity ? `<p>Purity: ${product.purity}</p>` : ''}

<p>⭐ ${product.rating} (${product.reviews})</p>

${product.details ? `<p class="product-detail">${product.details}</p>` : ''}
${product.hallmark ? `<p class="hallmark">Hallmark: ${product.hallmark}</p>` : ''}

<div class="btns">

<button class="cart-btn"
onclick="addToCart(${product.id})">
Cart
</button>

<button class="wish-btn" onclick="toggleWishlist(${product.id})">
${wishLabel}
</button>

<button class="buy-btn"
onclick="openOrderForm(${product.id})">
Buy
</button>

</div>

</div>

`;

});

}

renderProducts();

function searchProducts(){
currentSearch = document.getElementById("productSearch").value.trim();
renderProducts();
}

function requestQuantity(product){
if(product.metal === 'Gold' || product.metal === 'Silver'){
let quantityValue = prompt(`Enter quantity in grams for ${product.name}`,
product.weight ? product.weight : '1');
if(quantityValue === null) return null;
let quantity = parseFloat(quantityValue);
if(isNaN(quantity) || quantity <= 0){
alert('Please enter a valid quantity in grams.');
return null;
}
return quantity;
}
return product.weight || 1;
}

function viewCart(){
if(cart.length === 0){
alert("Your cart is empty.");
return;
}

let list = cart.map((item, index) => {
let product = products.find(product => product.id === item.id);
let quantity = item.quantity ? `${item.quantity}g` : '';
return product ? `${index + 1}. ${product.name} ${quantity}` : `${index + 1}. Item #${item.id}`;
}).join("\n");

let choice = prompt(`Cart Items:\n${list}\n\nEnter the item number to remove, or leave blank to keep all.`);
if(choice === null || choice.trim() === "") return;

let removeIndex = parseInt(choice, 10) - 1;
if(isNaN(removeIndex) || removeIndex < 0 || removeIndex >= cart.length){
alert("Invalid selection.");
return;
}

let removedItem = cart.splice(removeIndex, 1)[0];
saveCart();
let removedProduct = products.find(item => item.id === removedItem.id);
alert(removedProduct ? `${removedProduct.name} removed from cart.` : "Item removed from cart.");
}

function openWishlist(){

let choice = prompt(`Wishlist:\n${list}\n\nEnter the item number to remove, or leave blank to keep all.`);

if(isNaN(removeIndex) || removeIndex < 0 || removeIndex >= wishlist.length){

}

let removedId = wishlist.splice(removeIndex, 1)[0];

let removedProduct = products.find(item => item.id === removedId);

/* Convert Google Drive Link */

function convertDriveLink(link) {
if (link.includes("drive.google.com")) {
let match = link.match(/\/d\/([a-zA-Z0-9_-]+)/);
if (match && match[1]) {
return "https://lh3.googleusercontent.com/d/" + match[1];
}
}
return link;
}

/* Add Product */

function addProduct(){

let name = document.getElementById("pname").value.trim();
let weight = document.getElementById("pweight").value.trim();
let metal = document.getElementById("pmetal").value;
let category = document.getElementById("pcategory").value;
let maniSize = document.getElementById("pmaniSize").value;
let gifting = document.getElementById("pgifting") ? document.getElementById("pgifting").value : 'No';
let image = document.getElementById("pimg").value;
image = convertDriveLink(image);
let details = document.getElementById("pdetails").value;
let hallmark = document.getElementById("phallmark").value;
let purity = document.getElementById("ppurity").value;

if(!name || !metal || !category){
alert("Please complete the product name, metal, and category fields.");
return;
}

if(metal === 'Mani'){
if(!maniSize){
alert("Please select the Mani size/type.");
return;
}
} else {
if(!weight || isNaN(parseFloat(weight)) || parseFloat(weight) <= 0){
alert("Please enter a valid weight for Gold or Silver products.");
return;
}
}

let newProduct = {

id:Date.now(),

name:name,

metal:metal,

category:category,

weight: metal === 'Mani' ? null : parseFloat(weight),

maniSize: metal === 'Mani' ? maniSize : null,

gifting: gifting === 'Yes',

image:image,

details: details,

hallmark: hallmark,

purity: purity,

rating:5,

reviews:0

};

products.push(newProduct);

localStorage.setItem("products",JSON.stringify(products));

renderProducts();

alert("Product Added");

}
